<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Escapegineers logo</title>
  <desc id="desc">Minimal key and gear icon.</desc>

  <mask id="cutouts">
    <rect width="512" height="512" fill="white"></rect>
    <circle cx="256" cy="88" r="24" fill="black"></circle>
    <rect x="247" y="330" width="18" height="86" rx="6" fill="black"></rect>
    <circle cx="256" cy="382" r="34" fill="black"></circle>
  </mask>

  <g fill="currentColor" mask="url(#cutouts)">
    <!-- Gear body -->
    <circle cx="256" cy="382" r="64"></circle>

    <!-- Gear teeth -->
    <rect x="238" y="290" width="36" height="42" rx="8"></rect>
    <rect x="238" y="432" width="36" height="42" rx="8"></rect>
    <rect x="180" y="308" width="36" height="42" rx="8" transform="rotate(-45 198 329)"></rect>
    <rect x="296" y="308" width="36" height="42" rx="8" transform="rotate(45 314 329)"></rect>
    <rect x="296" y="414" width="36" height="42" rx="8" transform="rotate(-45 314 435)"></rect>
    <rect x="180" y="414" width="36" height="42" rx="8" transform="rotate(45 198 435)"></rect>
    <rect x="160" y="364" width="36" height="42" rx="8" transform="rotate(-90 178 385)"></rect>
    <rect x="316" y="364" width="36" height="42" rx="8" transform="rotate(-90 334 385)"></rect>

    <!-- Key -->
    <circle cx="256" cy="88" r="46"></circle>
    <rect x="238" y="134" width="36" height="242" rx="10"></rect>
    <rect x="256" y="188" width="48" height="22" rx="4"></rect>
    <rect x="256" y="246" width="38" height="22" rx="4"></rect>
  </g>
</svg>